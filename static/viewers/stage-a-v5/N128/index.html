<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Stage A — N=128 interactive viewer</title>
<style>
  body { font-family: 'Courier New', monospace; background: #1a1a2e;
         color: #eee; margin: 0; padding: 16px; }
  h1 { text-align: center; font-size: 20px; margin: 8px 0; }
  .controls { text-align: center; margin: 12px 0; }
  select { font-family: monospace; font-size: 16px; padding: 6px 12px;
            background: #16213e; color: #eee; border: 1px solid #555;
            border-radius: 4px; cursor: pointer; }
  iframe { width: 100%; height: 500px; border: 1px solid #333; overflow: hidden;
            border-radius: 4px; background: #0e1525; }
</style>
</head><body>
<h1>Stage A &mdash; N=128 &mdash; T*=0.350&ndash;0.450</h1>
<div class="controls">
  <label>Temperature: </label>
  <select id="temp-select" onchange="loadTemp()">
    <option value="T0.350">0.350</option>
    <option value="T0.355">0.355</option>
    <option value="T0.360">0.360</option>
    <option value="T0.365">0.365</option>
    <option value="T0.370">0.370</option>
    <option value="T0.375">0.375</option>
    <option value="T0.380">0.380</option>
    <option value="T0.385">0.385</option>
    <option value="T0.390">0.390</option>
    <option value="T0.395">0.395</option>
    <option value="T0.400">0.400</option>
    <option value="T0.405">0.405</option>
    <option value="T0.410">0.410</option>
    <option value="T0.415">0.415</option>
    <option value="T0.420">0.420</option>
    <option value="T0.425">0.425</option>
    <option value="T0.430">0.430</option>
    <option value="T0.435">0.435</option>
    <option value="T0.440">0.440</option>
    <option value="T0.445">0.445</option>
    <option value="T0.450">0.450</option>
  </select>
  &nbsp;&nbsp;
  <a href="#" id="mode-toggle" onclick="toggleMode(); return false;"
    style="color:#7ec8e3;font-size:13px;">open snapshot viewer</a>
</div>
<iframe id="viewer-frame" src="" scrolling="no"></iframe>
<script>
var _viewerMode = 'timeseries'; // 'timeseries' or 'snapshot'
function toggleMode() {
  if (_viewerMode === 'timeseries') {
    _viewerMode = 'snapshot';
    document.getElementById('mode-toggle').textContent = 'open timeseries viewer';
  } else {
    _viewerMode = 'timeseries';
    document.getElementById('mode-toggle').textContent = 'open snapshot viewer';
  }
  loadTemp();
}
function loadTemp() {
  const tk = document.getElementById('temp-select').value;
  var folder = _viewerMode === 'timeseries' ? 'interactive_viewers' : 'snapshot_viewers';
  document.getElementById('viewer-frame').src =
    folder + '/' + tk + '.html' + (window._fitMode ? '?fit=1' : '');
}
// Auto-resize inner iframe based on content height
var lastRelayed = 0;
window.addEventListener("message", function(e) {
  if (e.data && e.data.type === "contentResize" && !window._fitMode) {
    var frame = document.getElementById("viewer-frame");
    frame.style.height = e.data.height + "px";
    requestAnimationFrame(function() {
      var h = document.documentElement.scrollHeight;
      if (Math.abs(h - lastRelayed) > 2) {
        lastRelayed = h;
        window.parent.postMessage({type: "contentResize", height: h}, "*");
      }
    });
  }
});
// Load first temperature on page load
window.addEventListener('load', function() {
  if (window.self === window.top) {
    document.getElementById('viewer-frame').style.height = 'calc(100vh - 120px)';
    window._fitMode = true;
  }
  loadTemp();
});
</script>
</body></html>
