<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Stage A — N=32 interactive viewer</title>
<style>
  body { font-family: 'Courier New', monospace; background: #1a1a2e;
         color: #eee; margin: 0; padding: 16px; }
  h1 { text-align: center; font-size: 20px; margin: 8px 0; }
  .controls { text-align: center; margin: 12px 0; }
  select { font-family: monospace; font-size: 16px; padding: 6px 12px;
            background: #16213e; color: #eee; border: 1px solid #555;
            border-radius: 4px; cursor: pointer; }
  iframe { width: 100%; height: calc(100vh - 120px); border: 1px solid #333;
            border-radius: 4px; background: #0e1525; }
  .links { text-align: center; font-size: 12px; color: #666;
            margin: 8px 0; }
  .links a { color: #7ec8e3; text-decoration: none; }
  .links a:hover { text-decoration: underline; }
</style>
</head><body>
<h1>Stage A &mdash; N=32 &mdash; T*=0.350&ndash;0.450</h1>
<div class="controls">
  <label>Temperature: </label>
  <select id="temp-select" onchange="loadTemp()">
    <option value="T0.350">0.350</option>
    <option value="T0.355">0.355</option>
    <option value="T0.360">0.360</option>
    <option value="T0.365">0.365</option>
    <option value="T0.370">0.370</option>
    <option value="T0.375">0.375</option>
    <option value="T0.380">0.380</option>
    <option value="T0.385">0.385</option>
    <option value="T0.390">0.390</option>
    <option value="T0.395">0.395</option>
    <option value="T0.400">0.400</option>
    <option value="T0.405">0.405</option>
    <option value="T0.410">0.410</option>
    <option value="T0.415">0.415</option>
    <option value="T0.420">0.420</option>
    <option value="T0.425">0.425</option>
    <option value="T0.430">0.430</option>
    <option value="T0.435">0.435</option>
    <option value="T0.440">0.440</option>
    <option value="T0.445">0.445</option>
    <option value="T0.450">0.450</option>
  </select>
  &nbsp;&nbsp;
  <a href="#" onclick="document.getElementById('viewer-frame').src=
    'snapshot_viewers/' + document.getElementById('temp-select').value + '.html';
    return false;"
    style="color:#7ec8e3;font-size:13px;">open slider viewer</a>
</div>
<iframe id="viewer-frame" src=""></iframe>
<div class="links">
  Static plots:
  <a href="#" onclick="loadPlot('N32_energy_T035_T039.png');return false;">energy T035_T039</a> &nbsp;|&nbsp; <a href="#" onclick="loadPlot('N32_clusterop_T035_T039.png');return false;">cluster OP T035_T039</a> &nbsp;|&nbsp; <a href="#" onclick="loadPlot('N32_energy_T040_T045.png');return false;">energy T040_T045</a> &nbsp;|&nbsp; <a href="#" onclick="loadPlot('N32_clusterop_T040_T045.png');return false;">cluster OP T040_T045</a> &nbsp;|&nbsp; <a href="#" onclick="loadPlot('N32_hysteresis_10K_50K.png');return false;">hysteresis</a>
</div>
<script>
function loadPlot(filename) {
  document.getElementById("viewer-frame").src = "plot_viewer.html?src=" + encodeURIComponent(filename);
}
function loadTemp() {
  const tk = document.getElementById('temp-select').value;
  document.getElementById('viewer-frame').src =
    'interactive_viewers/' + tk + '.html';
}
// Load first temperature on page load
window.addEventListener('load', loadTemp);
</script>
</body></html>
