<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #1a1a2e; display: flex; justify-content: center;
         align-items: flex-start; min-height: 100vh; padding: 8px; overflow: auto; }
  img { max-width: 100%; height: auto; }
</style>
</head><body>
<img id="plot-img">
<script>
  const params = new URLSearchParams(window.location.search);
  const src = params.get('src') || '';
  if (src && src.match(/^[A-Za-z0-9_./-]+\.png$/)) {
    document.getElementById('plot-img').src = src;
  }
</script>
<script>new ResizeObserver(function(){window.parent.postMessage({type:"contentResize",height:document.body.scrollHeight},"*")}).observe(document.body);</script>
</body></html>
